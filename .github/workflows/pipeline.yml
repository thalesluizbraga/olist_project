name: dbt CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  DBT_METHOD: ${{ vars.DBT_METHOD }}
  DBT_PROJECT: ${{ vars.DBT_PROJECT }}
  DBT_DATASET: ${{ vars.DBT_DATASET }}
  DBT_LOCATION: ${{ vars.DBT_LOCATION }}
  DBT_THREADS: ${{ vars.DBT_THREADS }}
  DBT_PRIORITY: ${{ vars.DBT_PRIORITY }}
  DBT_JOB_TIMEOUT: ${{ vars.DBT_JOB_TIMEOUT }}
  DBT_JOB_RETRIES: ${{ vars.DBT_JOB_RETRIES }}
  DBT_KEYFILE_PATH: /tmp/gcp-key.json

jobs:
  dbt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dbt_olist
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required DBT vars
        run: |
          set -euo pipefail
          required_vars=(DBT_METHOD DBT_PROJECT DBT_DATASET DBT_LOCATION)
          for name in "${required_vars[@]}"; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "Missing required variable: $name"
              exit 1
            fi
          done

      - name: Detect GCP secret availability
        id: gcp_secret
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          BIGQUERY_SECRET_DBT_PROJECT_KEY: ${{ secrets.BIGQUERY_SECRET_DBT_PROJECT_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${GCP_SA_KEY:-}" ] || [ -n "${GCP_SERVICE_ACCOUNT_KEY:-}" ] || [ -n "${BIGQUERY_SECRET_DBT_PROJECT_KEY:-}" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail fast on main without GCP secret
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.gcp_secret.outputs.has_secret == 'false' }}
        run: |
          echo "Missing required secret on main: GCP_SA_KEY, GCP_SERVICE_ACCOUNT_KEY, or BIGQUERY_SECRET_DBT_PROJECT_KEY"
          exit 1

      - name: Skip dbt on PR without GCP secret
        if: ${{ github.event_name == 'pull_request' && steps.gcp_secret.outputs.has_secret == 'false' }}
        run: |
          echo "No GCP secret available for this pull request."
          echo "This is expected for PRs from forks. Skipping dbt execution."

      - name: Authenticate to GCP
        if: ${{ steps.gcp_secret.outputs.has_secret == 'true' }}
        run: |
          set -euo pipefail
          GCP_KEY="${{ secrets.GCP_SA_KEY }}"
          if [ -z "$GCP_KEY" ]; then
            GCP_KEY="${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}"
          fi
          if [ -z "$GCP_KEY" ]; then
            GCP_KEY="${{ secrets.BIGQUERY_SECRET_DBT_PROJECT_KEY }}"
          fi
          printf '%s' "$GCP_KEY" > "$DBT_KEYFILE_PATH"
          python -m json.tool "$DBT_KEYFILE_PATH" > /dev/null

      - name: Install dbt
        if: ${{ steps.gcp_secret.outputs.has_secret == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery

      - name: Install dbt dependencies
        if: ${{ steps.gcp_secret.outputs.has_secret == 'true' }}
        run: dbt deps --profiles-dir .

      - name: dbt debug (check connection)
        if: ${{ steps.gcp_secret.outputs.has_secret == 'true' }}
        run: dbt debug --profiles-dir .

      - name: Run CI (pull request)
        if: ${{ github.event_name == 'pull_request' && steps.gcp_secret.outputs.has_secret == 'true' }}
        run: |
          dbt seed --profiles-dir . --target dev
          dbt run --profiles-dir . --target dev
          dbt test --profiles-dir . --target dev

      - name: Run CD (push to main)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.gcp_secret.outputs.has_secret == 'true' }}
        run: |
          dbt seed --profiles-dir . --target prod
          dbt run --profiles-dir . --target prod
          dbt test --profiles-dir . --target prod
          dbt docs generate --profiles-dir . --target prod