name: dbt CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  DBT_METHOD: ${{ vars.DBT_METHOD }}
  DBT_PROJECT: ${{ vars.DBT_PROJECT }}
  DBT_DATASET: ${{ vars.DBT_DATASET }}
  DBT_LOCATION: ${{ vars.DBT_LOCATION }}
  DBT_THREADS: ${{ vars.DBT_THREADS }}
  DBT_PRIORITY: ${{ vars.DBT_PRIORITY }}
  DBT_JOB_TIMEOUT: ${{ vars.DBT_JOB_TIMEOUT }}
  DBT_JOB_RETRIES: ${{ vars.DBT_JOB_RETRIES }}
  DBT_KEYFILE_PATH: /tmp/gcp-key.json

jobs:
  dbt:
    runs-on: ubuntu-latest
    defaults:
      run:
      working-directory: ./olist_project/dbt_olist
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Authenticate to GCP
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > $DBT_KEYFILE_PATH

      - name: Install dbt
        run: |
          pip install --upgrade pip
          pip install dbt-bigquery

      - name: Install dbt Dependencies
        run: dbt deps

      - name: dbt Debug (Check Connection)
        run: dbt debug

      - name: Run CI (Pull Request)
        if: github.event_name == 'pull_request'
        run: |
          dbt seed --target dev
          dbt run --target dev
          dbt test --target dev

      - name: Run CD (Push to Main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          dbt seed --target prod
          dbt run --target prod
          dbt test --target prod
          dbt docs generate --target prod