name: dbt CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  DBT_HOST: localhost
  DBT_PORT: 5432
  DBT_USER: postgres
  DBT_PASSWORD: postgres
  DBT_DATABASE: dbt_db
  DBT_SCHEMA: public
  DBT_THREADS: 4
  DBT_PROFILES_DIR: 2-local_setup
  DBT_PROJECT_DIR: 3-dbt/dbt_olist

jobs:
  dbt:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dbt_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dbt_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply optional Postgres secrets
        env:
          SECRET_DBT_HOST: ${{ secrets.DBT_HOST }}
          SECRET_DBT_PORT: ${{ secrets.DBT_PORT }}
          SECRET_DBT_USER: ${{ secrets.DBT_USER }}
          SECRET_DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          SECRET_DBT_DATABASE: ${{ secrets.DBT_DATABASE }}
          SECRET_DBT_SCHEMA: ${{ secrets.DBT_SCHEMA }}
        run: |
          set -euo pipefail
          if [ -n "${SECRET_DBT_HOST:-}" ]; then
            echo "DBT_HOST=${SECRET_DBT_HOST}" >> "$GITHUB_ENV"
          fi
          if [ -n "${SECRET_DBT_PORT:-}" ]; then
            echo "DBT_PORT=${SECRET_DBT_PORT}" >> "$GITHUB_ENV"
          fi
          if [ -n "${SECRET_DBT_USER:-}" ]; then
            echo "DBT_USER=${SECRET_DBT_USER}" >> "$GITHUB_ENV"
          fi
          if [ -n "${SECRET_DBT_PASSWORD:-}" ]; then
            echo "DBT_PASSWORD=${SECRET_DBT_PASSWORD}" >> "$GITHUB_ENV"
          fi
          if [ -n "${SECRET_DBT_DATABASE:-}" ]; then
            echo "DBT_DATABASE=${SECRET_DBT_DATABASE}" >> "$GITHUB_ENV"
          fi
          if [ -n "${SECRET_DBT_SCHEMA:-}" ]; then
            echo "DBT_SCHEMA=${SECRET_DBT_SCHEMA}" >> "$GITHUB_ENV"
          fi

      - name: Write dbt profiles.yml
        run: |
          set -euo pipefail
          cat > "${DBT_PROFILES_DIR}/profiles.yml" <<'EOF'
          dbt_olist:
            target: dev
            outputs:
              dev:
                type: postgres
                host: "{{ env_var('DBT_HOST') }}"
                port: {{ env_var('DBT_PORT') | int }}
                user: "{{ env_var('DBT_USER') }}"
                password: "{{ env_var('DBT_PASSWORD') }}"
                dbname: "{{ env_var('DBT_DATABASE') }}"
                schema: "{{ env_var('DBT_SCHEMA') }}"
                threads: {{ env_var('DBT_THREADS') | int }}
          EOF

      - name: Install Python dependencies
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync environment and load raw data
        working-directory: 2-local_setup
        run: |
          set -euo pipefail
          uv sync --frozen
          cat > .env <<EOF
          DBT_USER=${DBT_USER}
          DBT_PASSWORD=${DBT_PASSWORD}
          DBT_HOST=${DBT_HOST}
          DBT_PORT=${DBT_PORT}
          DBT_DATABASE=${DBT_DATABASE}
          DBT_SCHEMA=${DBT_SCHEMA}
          DBT_THREADS=${DBT_THREADS}
          EOF
          uv run python -m etl.load_raw

      - name: Install dbt packages
        working-directory: 2-local_setup
        run: |
          set -euo pipefail
          uv run dbt deps --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir .

      - name: dbt debug (check connection)
        working-directory: 2-local_setup
        run: |
          set -euo pipefail
          uv run dbt debug --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev

      - name: Run CI (pull request)
        if: github.event_name == 'pull_request'
        working-directory: 2-local_setup
        run: |
          set -euo pipefail
          uv run dbt run --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev
          uv run dbt test --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev

      - name: Run CD (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: 2-local_setup
        run: |
          set -euo pipefail
          uv run dbt run --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev
          uv run dbt test --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev
          uv run dbt docs generate --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev

      - name: Run CD (manual)
        if: github.event_name == 'workflow_dispatch'
        working-directory: 2-local_setup
        run: |
          set -euo pipefail
          uv run dbt run --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev
          uv run dbt test --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev
          uv run dbt docs generate --project-dir "../${DBT_PROJECT_DIR}" --profiles-dir . --target dev
