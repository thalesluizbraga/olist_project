name: dbt CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt:
    runs-on: ubuntu-latest

    env:
      DBT_METHOD: ${{ vars.DBT_METHOD }}
      DBT_PROJECT: ${{ vars.DBT_PROJECT }}
      DBT_DATASET: ${{ vars.DBT_DATASET }}
      DBT_LOCATION: ${{ vars.DBT_LOCATION }}
      DBT_THREADS: ${{ vars.DBT_THREADS }}
      DBT_PRIORITY: ${{ vars.DBT_PRIORITY }}
      DBT_JOB_TIMEOUT: ${{ vars.DBT_JOB_TIMEOUT }}
      DBT_JOB_RETRIES: ${{ vars.DBT_JOB_RETRIES }}
      DBT_KEYFILE_PATH: /tmp/gcp-key.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Prepare GCP key
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json

      - name: dbt deps
        run: uv run dbt deps --project-dir dbt_olist --profiles-dir dbt_olist

      - name: dbt debug
        run: uv run dbt debug --project-dir dbt_olist --profiles-dir dbt_olist

      - name: dbt run
        run: uv run dbt run --project-dir dbt_olist --profiles-dir dbt_olist

      - name: dbt test
        run: uv run dbt test --project-dir dbt_olist --profiles-dir dbt_olist

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt_olist/target/manifest.json
            dbt_olist/target/run_results.json
