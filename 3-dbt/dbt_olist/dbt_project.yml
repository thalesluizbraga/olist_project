
# Projeto dbt Olist — fonte da verdade dos modelos (espelhada em 4-airflow/dbt_olist/)
name: 'dbt_olist'
version: '1.0.0'

# Nome do profile em ~/.dbt/profiles.yml (local) ou gerado pelo Cosmos (Airflow)
profile: 'dbt_olist'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Materialização por camada (pastas numeradas em models/)
models:
  dbt_olist:
    1_staging:
      +materialized: view       # limpeza leve sobre raw.* — recria rápido
    2_intermediate:
      +materialized: view       # joins entre staging — camada analítica
    3_marts:
      +materialized: table      # dim/fct finais consumidos pelo Power BI
