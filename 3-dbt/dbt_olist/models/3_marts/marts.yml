version: 2

models:
  - name: fct_monthly_revenue
    description: >
      Mart model with monthly revenue metrics aggregated from order item data,
      including gross revenue, freight, and net revenue.
    columns:
      - name: mes
        description: Month reference date for the aggregated metrics.
      - name: receita
        description: Total gross revenue from item values in the month.
      - name: frete
        description: Total freight value in the month.
      - name: receita_liquida
        description: Net revenue calculated as gross revenue minus freight.

  - name: dim_customers
    description: "Customer dimension with purchase history and revenue by category."
    columns:
      - name: id_unico_cliente
        tests:
          - not_null

  - name: dim_products
    description: "Product dimension with sales aggregates."
    columns:
      - name: id_produto
        tests:
          - unique
          - not_null

  - name: dim_sellers
    description: "Seller dimension with sales aggregates."
    columns:
      - name: id_vendedor
        tests:
          - unique
          - not_null
